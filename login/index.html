<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login For Best Price</title>
    <link rel="stylesheet" href="style.css">
    <base href="/"> <!-- Tambahkan ini kalau perlu -->
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">⚡</div>
                <h2>Sign In</h2>
                <p>Access your account</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <!-- ... form login tetap sama ... -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">Email</label>
                        <span class="input-line"></span>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="toggle-icon"></span>
                        </button>
                        <span class="input-line"></span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="login-btn btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"></span>
                    <span class="btn-glow"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>New here? <a href="register.html" id="registerLink">Create an account</a></p>
            </div>
        </div>
    </div>

    <script src="../../shared/js/form-utils.js"></script>
    <script src="script.js"></script>
    <script src="js/login.js"></script>

    <script>
        // Fix klik Create Account
        document.addEventListener("DOMContentLoaded", function() {
            const registerLink = document.getElementById("registerLink");
            if (registerLink) {
                registerLink.addEventListener("click", function() {
                    console.log("✅ Link Create Account diklik");
                    // Bisa tambahkan ini kalau masih bermasalah:
                    // window.location.href = "register.html";
                });
            }
        });
    </script>
</body>
</html>
